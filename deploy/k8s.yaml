apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbiter
  namespace: orchard
  labels:
    app: arbiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arbiter
  template:
    metadata:
      labels:
        app: arbiter
    spec:
      containers:
        - name: arbiter
          image: harbor.draco.quest/orchard/arbiter:latest
          ports:
            - containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: arbiter
  namespace: orchard
  labels:
    app: arbiter
spec:
  type: ClusterIP
  selector:
    app: arbiter
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: grpc
