name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: go test ./... -count=1 -short -timeout=120s

      - name: Vet
        run: go vet ./...

      - name: Build CLI
        run: go build -o /dev/null ./cmd/arbiter

      - name: Build Agent
        run: go build -o /dev/null ./cmd/arbiter-agent

      - name: Check grammar
        run: go run ./cmd/arbiter check testdata/fraud.arb
